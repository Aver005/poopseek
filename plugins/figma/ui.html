<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PoopSeek</title>
<style>/* CSS_INLINE */</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="header">
  <div class="dot" id="dot"></div>
  <span class="header-label" id="statusLabel">Подключение…</span>
  <button class="btn-icon" id="clearBtn" title="Очистить чат">✕</button>
  <button class="btn-icon" id="settingsBtn" title="Настройки">⚙</button>
</div>

<div class="settings" id="settings">
  <div class="settings-inner">
    <div>
      <label>Адрес сервера</label>
      <input id="serverInput" type="text" value="http://localhost:7331">
    </div>
    <button class="save-btn" id="saveSettingsBtn">Сохранить</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="msg system">Опишите что нужно создать в Figma</div>
</div>

<input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" multiple style="display:none">

<div id="screenshotPreview" class="screenshot-preview" style="display:none"></div>

<div class="input-area" id="inputArea">
  <div class="input-row">
    <textarea id="input" placeholder="Нарисуй онбординг для iOS-приложения…" rows="3"></textarea>
    <button class="send-btn" id="sendBtn" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 17 5-5-5-5"/><path d="m13 17 5-5-5-5"/></svg>
    </button>
  </div>
  <div class="input-toolbar">
    <button class="toolbar-btn" id="attachBtn" title="Прикрепить файл">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <button class="toolbar-btn" id="screenshotBtn" title="Снимок нод Figma (выделенных или всей страницы)">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
    </button>
    <button class="toolbar-btn" id="censorBtn" title="Визуальный цензор: после генерации делает скриншот, оценивает и автоматически исправляет (до 3 итераций)">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
    <div class="toolbar-spacer"></div>
    <button class="toolbar-btn" id="undoBtn" title="Отменить ввод (Ctrl+Z)">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
    </button>
    <button class="toolbar-btn" id="redoBtn" title="Повторить ввод (Ctrl+Y)">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="eraserBtn" title="Очистить чат и холст">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
    </button>
  </div>
</div>

<script>
  let serverUrl = 'http://localhost:7331';
  let sessionId = null;
  let busy = false;
  let connected = false;
  let usingSse = false;
  let pendingSnapshotResolve = null;
  let pendingSnapshotReject = null;
  let pendingScreenshotResolve = null;
  let pendingScreenshotReject = null;
  let attachedImages = []; // { data: string (base64), mimeType: string }[]
  let lastUserPrompt = null;     // for "Перегенерировать"
  let lastUserImages = null;
  let lastBuilderJsx = null;     // for "JSX" button in debug-log card
  let lastAssistantText = null;  // raw LLM response (REMOVED + DIFF for edit turns)

  // ── Censor (visual QA) state ──────────────────────────
  // censorEnabled persists across sessions via localStorage.
  // censorPending: a finished chat turn (or censor-fix turn) is waiting
  //   for the plugin's OPS_DONE so we can screenshot + run another pass.
  // censorIteration: 0..MAX-1, bumped each time we send a /v1/censor.
  // currentCensorCard: the in-progress card element (so we can update its
  //   status line as we go through "screenshot → review → fix").
  let censorEnabled = false;
  let censorPending = false;
  let censorIteration = 0;
  let currentCensorCard = null;
  let gotOpsThisTurn = false;
  const MAX_CENSOR_ITERATIONS = 3;
  try { censorEnabled = localStorage.getItem('censorEnabled') === '1'; } catch { /* ignore */ }

  const dot = document.getElementById('dot');
  const statusLabel = document.getElementById('statusLabel');
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const attachBtn = document.getElementById('attachBtn');
  const fileInput = document.getElementById('fileInput');
  const screenshotBtn = document.getElementById('screenshotBtn');
  const censorBtn = document.getElementById('censorBtn');
  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');
  const eraserBtn = document.getElementById('eraserBtn');
  const screenshotPreview = document.getElementById('screenshotPreview');
  const inputArea = document.getElementById('inputArea');
  const settingsPanel = document.getElementById('settings');
  const serverInput = document.getElementById('serverInput');
  const clearBtn = document.getElementById('clearBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');

  // ── Status ──────────────────────────────────────────
  // Single source of truth for the disabled state of every interactive
  // control. `busy` covers the whole agent loop (chat → ops → optional
  // censor iterations); `connected` covers server reachability. Anything
  // that should freeze the user during agent work goes through here.
  function applyBusyState() {
    sendBtn.disabled = !connected || busy;
    attachBtn.disabled = busy;
    screenshotBtn.disabled = !connected || busy;
    if (censorBtn) censorBtn.disabled = busy;
    inputEl.disabled = busy;
  }

  function setBusy(value) {
    busy = value;
    applyBusyState();
  }

  function setStatus(ok, label) {
    connected = ok;
    dot.className = 'dot ' + (ok ? 'ok' : 'err');
    statusLabel.textContent = label;
    applyBusyState();
  }

  // Reflect persisted toggle state on mount.
  if (censorEnabled) censorBtn.classList.add('active');
  censorBtn.addEventListener('click', () => {
    if (busy) return;
    censorEnabled = !censorEnabled;
    try { localStorage.setItem('censorEnabled', censorEnabled ? '1' : '0'); } catch { /* ignore */ }
    censorBtn.classList.toggle('active', censorEnabled);
  });

  // ── Image helpers ─────────────────────────────────────
  const MAX_IMAGE_PX = 1280;

  function resizeToBase64(src) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > MAX_IMAGE_PX || height > MAX_IMAGE_PX) {
          const ratio = Math.min(MAX_IMAGE_PX / width, MAX_IMAGE_PX / height);
          width  = Math.round(width  * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width  = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/png');
        resolve(dataUrl.split(',')[1]);
      };
      img.src = src;
    });
  }

  async function processFile(file) {
    if (!file || !file.type.startsWith('image/')) return null;
    const mimeType = 'image/png';
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const data = await resizeToBase64(reader.result);
          resolve({ data, mimeType });
        } catch (e) { reject(e); }
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function attachFiles(files) {
    const results = await Promise.all(Array.from(files).map(processFile));
    let added = 0;
    for (const img of results) {
      if (img) { attachedImages.push(img); added++; }
    }
    if (added > 0) renderScreenshotPreview();
    return added;
  }

  // ── Screenshot ────────────────────────────────────────
  function requestScreenshot() {
    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        pendingScreenshotResolve = null;
        pendingScreenshotReject = null;
        reject(new Error('Screenshot timeout'));
      }, 8000);

      pendingScreenshotResolve = (images) => {
        clearTimeout(timeout);
        pendingScreenshotResolve = null;
        pendingScreenshotReject = null;
        resolve(images);
      };
      pendingScreenshotReject = (error) => {
        clearTimeout(timeout);
        pendingScreenshotResolve = null;
        pendingScreenshotReject = null;
        reject(error);
      };

      parent.postMessage({ pluginMessage: { type: 'REQUEST_SCREENSHOT' } }, '*');
    });
  }

  function renderScreenshotPreview() {
    if (attachedImages.length === 0) {
      screenshotPreview.style.display = 'none';
      screenshotPreview.innerHTML = '';
      return;
    }
    screenshotPreview.style.display = 'flex';
    screenshotPreview.innerHTML = '';
    attachedImages.forEach((img, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'screenshot-thumb-wrap';
      const thumb = document.createElement('img');
      thumb.src = 'data:' + img.mimeType + ';base64,' + img.data;
      thumb.className = 'screenshot-thumb';
      const rm = document.createElement('button');
      rm.className = 'screenshot-thumb-rm';
      rm.textContent = '×';
      rm.onclick = () => {
        attachedImages.splice(idx, 1);
        renderScreenshotPreview();
      };
      wrap.appendChild(thumb);
      wrap.appendChild(rm);
      screenshotPreview.appendChild(wrap);
    });
  }

  screenshotBtn.addEventListener('click', async () => {
    if (busy) return;
    screenshotBtn.disabled = true;
    try {
      const rawImages = await requestScreenshot();
      for (const b64 of rawImages) {
        const data = await resizeToBase64('data:image/png;base64,' + b64);
        attachedImages.push({ data, mimeType: 'image/png' });
      }
      renderScreenshotPreview();
    } catch (err) {
      addMsg('Не удалось сделать снимок: ' + err.message, 'error');
    } finally {
      screenshotBtn.disabled = !connected || busy;
    }
  });

  // ── File button ───────────────────────────────────────
  attachBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async () => {
    await attachFiles(fileInput.files);
    fileInput.value = '';
  });

  // ── Clipboard paste ───────────────────────────────────
  document.addEventListener('paste', async (e) => {
    if (busy) return;
    const items = Array.from(e.clipboardData?.items ?? []);
    const imageItems = items.filter(item => item.type.startsWith('image/'));
    if (imageItems.length === 0) return;
    e.preventDefault();
    const files = imageItems.map(item => item.getAsFile()).filter(Boolean);
    const added = await attachFiles(files);
    if (added > 0) inputEl.focus();
  });

  // ── Drag and drop ─────────────────────────────────────
  let dragCounter = 0;

  inputArea.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    inputArea.classList.add('drag-over');
  });

  inputArea.addEventListener('dragleave', () => {
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; inputArea.classList.remove('drag-over'); }
  });

  inputArea.addEventListener('dragover', (e) => { e.preventDefault(); });

  inputArea.addEventListener('drop', async (e) => {
    e.preventDefault();
    dragCounter = 0;
    inputArea.classList.remove('drag-over');
    const files = e.dataTransfer?.files;
    if (files?.length) await attachFiles(files);
  });

  async function checkStatus() {
    try {
      const r = await fetch(serverUrl + '/v1/status', { signal: AbortSignal.timeout(2500) });
      if (r.ok) {
        setStatus(true, 'Сервер подключён');
        syncSnapshotToServer();
      } else setStatus(false, 'Ошибка сервера');
    } catch {
      setStatus(false, 'Сервер недоступен — запустите /figma');
    }
  }

  // ── CLI ops polling ──────────────────────────────────
  let totalOpsThisTurn = 0;
  async function pollOps() {
    if (!connected || usingSse) return;
    try {
      const r = await fetch(serverUrl + '/v1/poll-ops', { signal: AbortSignal.timeout(2500) });
      if (!r.ok) return;
      const data = await r.json();
      if (data.ops?.length > 0) {
        totalOpsThisTurn += data.ops.length;
        parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: data.ops } }, '*');
      }
    } catch { /* ignore */ }
  }

  function resetTurnOps() { totalOpsThisTurn = 0; }

  function requestSnapshotFromPlugin() {
    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        pendingSnapshotResolve = null;
        pendingSnapshotReject = null;
        reject(new Error('Snapshot timeout'));
      }, 3000);

      pendingSnapshotResolve = (snapshot) => {
        clearTimeout(timeout);
        pendingSnapshotResolve = null;
        pendingSnapshotReject = null;
        resolve(snapshot);
      };
      pendingSnapshotReject = (error) => {
        clearTimeout(timeout);
        pendingSnapshotResolve = null;
        pendingSnapshotReject = null;
        reject(error);
      };

      parent.postMessage({ pluginMessage: { type: 'REQUEST_SNAPSHOT' } }, '*');
    });
  }

  async function syncSnapshotToServer() {
    if (!connected) return;

    try {
      const snapshot = await requestSnapshotFromPlugin();
      const resp = await fetch(serverUrl + '/v1/snapshot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, snapshot }),
        signal: AbortSignal.timeout(5000),
      });
      if (resp.ok && !sessionId) {
        const data = await resp.json();
        if (data.sessionId) sessionId = data.sessionId;
      }
    } catch {
      /* snapshot sync is best-effort */
    }
  }

  // ── Messages ─────────────────────────────────────────
  function addMsg(text, type) {
    const el = document.createElement('div');
    el.className = 'msg ' + type;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  // Parse a handyman response into { summary, removedCount, touchedCount,
  // keptCount, diffJsx }. Best-effort — uses regex over the textual
  // sections rather than a full JSX parser. Counts ignore the surrounding
  // root frame entry (LandingPage etc.) since wrapping for context isn't
  // a real change.
  function parseEditResponse(text) {
    if (!text) return null;
    const removedRaw = (text.match(/##\s+REMOVED\b[^\n]*\n([\s\S]*?)(?=\n##|\s*$)/i)?.[1] || '').trim();
    const diffRaw   = (text.match(/##\s+DIFF\b[^\n]*\n([\s\S]*?)(?=\n##|\s*$)/i)?.[1] || '').trim();

    const removedKeys = removedRaw && removedRaw !== '(none)'
      ? removedRaw.split(/[\n,]+/)
          .map(s => s.replace(/^[-*]\s*/, '').trim())
          .filter(s => s && s !== '(none)')
      : [];

    const diffJsx = (diffRaw.match(/```(?:jsx)?\s*([\s\S]*?)```/)?.[1] || diffRaw).trim();
    const keyMatches = [...diffJsx.matchAll(/<\w+\s[^>]*\bkey="([^"]+)"/g)];
    const totalKeys  = keyMatches.length;
    const keptMatches = diffJsx.match(/<\w+\s[^>]*\bold\b(?:\s|\/|>)/g) || [];
    const keptCount  = keptMatches.length;
    // First key is usually the wrapping root for context — don't count it
    // toward "touched" if it has no own props/children except the children
    // list (i.e. the LLM just descended into it).
    const touchedCount = Math.max(0, totalKeys - keptCount);

    return {
      removedKeys,
      removedCount: removedKeys.length,
      touchedCount,
      keptCount,
      diffJsx,
    };
  }

  // Inline collapsible block: a small chip-style button + a `<pre>` panel.
  // Click toggles the panel. Returns the wrapper element.
  function makeToggleSection(label, content) {
    const wrap = document.createElement('span');
    wrap.className = 'inline-toggle';

    const btn = document.createElement('button');
    btn.className = 'inline-toggle-btn';
    btn.textContent = label;
    btn.title = 'Развернуть / скопировать';

    const panel = document.createElement('div');
    panel.className = 'inline-toggle-panel';
    panel.style.display = 'none';

    const pre = document.createElement('pre');
    pre.className = 'inline-toggle-content';
    pre.textContent = content;
    panel.appendChild(pre);

    const copy = document.createElement('button');
    copy.className = 'inline-toggle-copy';
    copy.textContent = '📋 Скопировать';
    copy.onclick = async (e) => {
      e.stopPropagation();
      const ok = await copyToClipboard(content);
      flashCopyResult(copy, ok, '📋 Скопировать');
    };
    panel.appendChild(copy);

    btn.onclick = () => {
      const isHidden = panel.style.display === 'none';
      panel.style.display = isHidden ? 'block' : 'none';
      btn.classList.toggle('open', isHidden);
    };

    wrap.appendChild(btn);
    wrap.appendChild(panel);
    return wrap;
  }

  // Build the post-turn assistant card. For `edit` intent we parse the
  // LLM's structured response and show counts; for `create` we just show
  // a confirmation line. In both cases we attach toggle buttons exposing
  // the raw JSX/diff on demand, instead of dumping them inline.
  function renderAssistantSummary(el, intent, rawText) {
    const head = document.createElement('div');
    head.className = 'msg-summary-head';

    if (intent === 'create') {
      head.textContent = '✓ Дизайн создан и выложен на холст';
    } else {
      const parsed = parseEditResponse(rawText);
      const parts = [];
      if (parsed) {
        if (parsed.touchedCount > 0) parts.push(parsed.touchedCount + ' изменено / добавлено');
        if (parsed.removedCount > 0) parts.push(parsed.removedCount + ' удалено');
        if (parsed.keptCount    > 0) parts.push(parsed.keptCount    + ' сохранено');
      }
      head.textContent = parts.length > 0
        ? '✓ Применено: ' + parts.join(', ')
        : '✓ Изменения применены';
    }
    el.appendChild(head);

    const row = document.createElement('div');
    row.className = 'msg-summary-actions';

    // DIFF / response toggle — raw LLM output. Useful for debugging what
    // the model actually asked for.
    if (rawText && rawText.trim().length > 0) {
      row.appendChild(makeToggleSection(
        intent === 'create' ? '{} JSX-ответ' : '{} Diff',
        rawText.trim(),
      ));
    }

    // Tree toggle — current state of the buffer (post-apply for edit, the
    // builder's JSX for create).
    if (lastBuilderJsx) {
      row.appendChild(makeToggleSection('🌳 Дерево', lastBuilderJsx));
    }

    if (row.children.length > 0) el.appendChild(row);
  }

  function addPostGenerationActions() {
    const wrap = document.createElement('div');
    wrap.className = 'msg actions';

    const regen = document.createElement('button');
    regen.className = 'action-btn action-btn-regen';
    regen.title = 'Удалить весь дизайн (узлы, переменные, стили, UI Kit) и запустить тот же запрос заново';
    regen.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg><span>Перегенерировать</span>';
    regen.onclick = () => regenerateDesign(regen);

    const fresh = document.createElement('button');
    fresh.className = 'action-btn action-btn-fresh';
    fresh.title = 'Очистить чат и историю — дизайн на холсте остаётся как есть';
    fresh.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3"/><path d="M18.5 5.5l-2 2"/><path d="M21 12h-3"/><path d="M5.5 5.5l2 2"/><path d="M3 12h3"/><circle cx="12" cy="14" r="6"/></svg><span>Новый дизайн</span>';
    fresh.onclick = () => newDesignSession(fresh);

    wrap.appendChild(regen);
    wrap.appendChild(fresh);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function regenerateDesign(srcBtn) {
    if (busy) return;
    if (!lastUserPrompt) {
      addMsg('Нет предыдущего запроса для повтора', 'error');
      return;
    }
    if (srcBtn) srcBtn.disabled = true;

    // Wipe everything on plugin side: frames, variables, text styles, UI Kit page.
    parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: [{ type: 'wipe_design' }] } }, '*');

    // Drop server-side session so the next message starts fresh
    // (no stale snapshot, no stale enhance-cache hit on the same text).
    sessionId = null;

    addMsg('🔄 Повторяю запрос на чистом холсте…', 'system');

    // Brief delay to let the wipe op finish before the re-send triggers a snapshot.
    await new Promise((resolve) => setTimeout(resolve, 400));

    // Re-issue the previous prompt + images.
    inputEl.value = lastUserPrompt;
    attachedImages = (lastUserImages ?? []).slice();
    renderScreenshotPreview();
    autoResize();
    send();
  }

  function newDesignSession(srcBtn) {
    if (busy) return;
    if (srcBtn) srcBtn.disabled = true;
    sessionId = null;
    attachedImages = [];
    renderScreenshotPreview();
    lastUserPrompt = null;
    lastUserImages = null;
    const msgs = messagesEl.querySelectorAll('.msg');
    msgs.forEach((m, i) => {
      m.style.transition = 'opacity .25s var(--ease-out-expo), transform .25s var(--ease-out-expo)';
      m.style.opacity = '0';
      m.style.transform = 'translateY(-8px) scale(.95)';
      m.style.transitionDelay = (msgs.length - i) * .03 + 's';
    });
    setTimeout(() => {
      messagesEl.innerHTML = '<div class="msg system">Чат очищен. Дизайн на холсте сохранён.</div>';
    }, 300);
  }

  function addUserMsg(text, images) {
    const el = document.createElement('div');
    el.className = 'msg user';
    if (images && images.length > 0) {
      const grid = document.createElement('div');
      grid.className = 'msg-images';
      for (const img of images) {
        const t = document.createElement('img');
        t.src = 'data:' + img.mimeType + ';base64,' + img.data;
        t.className = 'msg-thumb';
        grid.appendChild(t);
      }
      el.appendChild(grid);
    }
    if (text) {
      const txt = document.createElement('div');
      txt.textContent = text;
      el.appendChild(txt);
    }
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  // ── Status animation (cycling dots with updatable label) ────
  function startStatusAnim(el, initialLabel) {
    let label = initialLabel;
    let n = 0;
    el.textContent = label;
    el.style.opacity = '0';
    requestAnimationFrame(() => { el.style.opacity = '1'; });
    const timerId = setInterval(() => {
      n = (n + 1) % 4;
      const dots = '.'.repeat(n || 3);
      const suffix = totalOpsThisTurn > 0 ? ` [${totalOpsThisTurn} элем.]` : '';
      el.textContent = label + dots + suffix;
    }, 350);
    return {
      setLabel(newLabel) { label = newLabel; n = 0; el.textContent = newLabel; },
      stop() { clearInterval(timerId); },
    };
  }

  // ── Send ──────────────────────────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    setBusy(true);
    usingSse = false;
    inputEl.value = '';
    autoResize();

    const imagesToSend = attachedImages.slice();
    attachedImages = [];
    renderScreenshotPreview();

    // Snapshot for "Перегенерировать" — re-uses this exact request.
    lastUserPrompt = text;
    lastUserImages = imagesToSend.slice();
    lastBuilderJsx = null;       // reset — fresh turn, new JSX coming
    lastAssistantText = null;    // reset — fresh turn, new response coming

    resetTurnOps();
    // Each new user turn starts a fresh censor cycle.
    censorPending = false;
    censorIteration = 0;
    currentCensorCard = null;
    gotOpsThisTurn = false;
    addUserMsg(text, imagesToSend);
    const thinkEl = addMsg('', 'thinking');
    const anim = startStatusAnim(
      thinkEl,
      imagesToSend.length > 0 ? 'Анализирую картинку' : 'Запрос получен',
    );

    let currentIntent = null;

    try {
      await syncSnapshotToServer();

      const resp = await fetch(serverUrl + '/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify({ sessionId, message: text, images: imagesToSend.length > 0 ? imagesToSend : undefined, censor: censorEnabled }),
        signal: AbortSignal.timeout(600_000),
      });

      if (!resp.ok) throw new Error('HTTP ' + resp.status);

      const contentType = resp.headers.get('content-type') || '';

      if (contentType.includes('text/event-stream')) {
        usingSse = true;
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        outer: while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const blocks = buf.split('\n\n');
          buf = blocks.pop();

          for (const block of blocks) {
            if (!block.trim()) continue;
            let eName = 'message', eData = null;
            for (const line of block.split('\n')) {
              if (line.startsWith('event: ')) eName = line.slice(7).trim();
              else if (line.startsWith('data: ')) {
                try { eData = JSON.parse(line.slice(6)); } catch { /* ignore */ }
              }
            }
            if (!eData) continue;
            if (eData.sessionId) sessionId = eData.sessionId;

            switch (eName) {
              case 'vision':
                if (eData.ok) {
                  addMsg('🖼️ Картинка прикреплена ко всем агентам (' + eData.count + ')', 'system');
                } else if (eData.error) {
                  addMsg('⚠️ Картинка не прикреплена: ' + eData.error, 'error');
                }
                break;
              case 'uikit-start':
                anim.setLabel('Собираю UI Kit (' + eData.count + ' компонент.)');
                break;
              case 'uikit-done':
                addMsg('🧩 UI Kit готов: ' + (eData.components?.join(', ') || '(0)'), 'system');
                anim.setLabel('Запрос улучшен');
                break;
              case 'uikit-error':
                addMsg('⚠️ UI Kit не собран — экраны будут с инлайн-фреймами: ' + (eData.error || 'unknown'), 'error');
                break;
              case 'intent':
                currentIntent = eData.intent;
                if (eData.intent === 'create') {
                  anim.setLabel('Запрос улучшен');
                  setTimeout(() => anim.setLabel('Выбран режим «Создание»'), 700);
                } else {
                  anim.setLabel('Выбран режим «Редактирование»');
                  setTimeout(() => anim.setLabel('Рукастый мастерски взял Ваши пожелания'), 700);
                }
                break;
              case 'tokens':
                anim.setLabel('Строитель уже кладёт кирпичики');
                break;
              case 'jsx':
                if (typeof eData.jsx === 'string' && eData.jsx.length > 0) {
                  lastBuilderJsx = eData.jsx;
                }
                break;
              case 'ops':
                if (eData.ops?.length > 0) {
                  totalOpsThisTurn += eData.ops.length;
                  gotOpsThisTurn = true;
                  // Arm the censor BEFORE we hand ops to the plugin. Plugin
                  // batch runs async — OPS_DONE can fire before the SSE
                  // "done" event lands, and if censorPending isn't already
                  // true at that moment, the OPS_DONE handler misses the
                  // chance to start the loop.
                  if (censorEnabled) {
                    censorPending = true;
                    censorIteration = 0;
                  }
                  parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: eData.ops } }, '*');
                }
                break;
              case 'debug-jsx':
                // Edit-flow tree snapshot. Don't render directly — spamming
                // the entire post-edit tree as monospace gunk is what the
                // user complained about. Stash it; the JSX/Tree toggle on
                // the assistant message exposes it on demand.
                if (typeof eData.jsx === 'string' && eData.jsx.length > 0) {
                  lastBuilderJsx = eData.jsx;
                }
                break;
              case 'done':
                anim.stop();
                thinkEl.className = 'msg assistant';
                thinkEl.innerHTML = '';
                if (typeof eData.text === 'string') lastAssistantText = eData.text;
                renderAssistantSummary(thinkEl, currentIntent, eData.text);
                addPostGenerationActions();
                break outer;
              case 'error':
                anim.stop();
                thinkEl.className = 'msg error';
                thinkEl.textContent = 'Ошибка: ' + (eData.error || 'неизвестная ошибка');
                // Don't run censor on a failed turn.
                censorPending = false;
                break outer;
            }
          }
        }

        if (thinkEl.className === 'msg thinking') {
          anim.stop();
          thinkEl.className = 'msg assistant';
          thinkEl.textContent = '✓ Готово';
        }
      } else {
        // fallback: legacy JSON
        const data = await resp.json();
        sessionId = data.sessionId;
        anim.stop();
        thinkEl.className = 'msg assistant';
        thinkEl.textContent = '✓ Готово';
      }
    } catch (err) {
      anim.stop();
      thinkEl.className = 'msg error';
      thinkEl.textContent = 'Ошибка: ' + err.message;
      setStatus(false, 'Нет соединения');
    } finally {
      usingSse = false;
      // Censor takes over `busy` from here. If a censor cycle is queued,
      // the loop's terminal exit (severity=ok / max iterations / error)
      // will release. Otherwise release immediately.
      if (!censorPending) setBusy(false);
    }
  }

  // ── Messages from main thread ─────────────────────────
  window.onmessage = (event) => {
    const msg = event.data?.pluginMessage;
    if (!msg) return;
    if (msg.type === 'OPS_DONE')  {
      addMsg('✓ ' + msg.count + ' элемент(ов) на канвасе', 'system');
      syncSnapshotToServer();
      if (censorPending) {
        censorPending = false;
        runCensorIteration();
      }
    }
    if (msg.type === 'OPS_ERROR') addMsg('Ошибка холста: ' + msg.error, 'error');
    if (msg.type === 'SNAPSHOT' && pendingSnapshotResolve) pendingSnapshotResolve(msg.snapshot);
    if (msg.type === 'SCREENSHOT_READY' && pendingScreenshotResolve) pendingScreenshotResolve(msg.images);
    if (msg.type === 'SCREENSHOT_ERROR' && pendingScreenshotReject) pendingScreenshotReject(new Error(msg.error));
    if (msg.type === 'DEBUG_LOG' && Array.isArray(msg.lines)) renderDebugLogCard(msg.lines);
  };

  // Reusable clipboard-with-fallback helper. Returns `true` on success.
  async function copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      let ok = false;
      try { ok = document.execCommand('copy'); } catch { ok = false; }
      document.body.removeChild(ta);
      return ok;
    }
  }

  // Bind a 1.5s "✓ Copied" / "✗ Failed" feedback flash to a button.
  function flashCopyResult(btn, ok, defaultLabel) {
    btn.textContent = ok ? '✓ Copied' : '✗ Failed';
    setTimeout(() => { btn.textContent = defaultLabel; }, 1500);
  }

  // Render the per-batch log buffer as a copyable card. Two buttons:
  //   "📋 Copy" — full debug log (errors + traces) for paste-to-assistant
  //   "{} JSX"  — original JSX tree from the builder, for inspection
  // The JSX button is only rendered when we actually have a captured JSX
  // for the most recent turn.
  function renderDebugLogCard(lines) {
    if (lines.length === 0) return;
    const errCount = lines.filter(l => l.startsWith('ERR')).length;
    const okCount = lines.length - errCount;
    const blob = lines.join('\n');
    const jsxAtRender = lastBuilderJsx;   // capture by value — turn-scoped

    const el = document.createElement('div');
    el.className = 'msg debug-log';
    const summary = document.createElement('div');
    summary.className = 'debug-log-summary';
    summary.textContent = '🔍 Debug log: ' + lines.length + ' lines (' + okCount + ' ok, ' + errCount + ' err)';

    const buttonsRow = document.createElement('span');
    buttonsRow.className = 'debug-log-actions';

    const copyBtn = document.createElement('button');
    copyBtn.className = 'debug-log-copy';
    copyBtn.textContent = '📋 Copy';
    copyBtn.onclick = async () => {
      const ok = await copyToClipboard(blob);
      flashCopyResult(copyBtn, ok, '📋 Copy');
    };
    buttonsRow.appendChild(copyBtn);

    if (jsxAtRender) {
      const jsxBtn = document.createElement('button');
      jsxBtn.className = 'debug-log-copy debug-log-jsx';
      jsxBtn.textContent = '{} JSX';
      jsxBtn.title = 'Скопировать оригинальный JSX-ответ агента';
      jsxBtn.onclick = async () => {
        const ok = await copyToClipboard(jsxAtRender);
        flashCopyResult(jsxBtn, ok, '{} JSX');
      };
      buttonsRow.appendChild(jsxBtn);
    }

    summary.appendChild(buttonsRow);
    el.appendChild(summary);
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Censor (visual QA) loop ───────────────────────────
  // Triggered after a chat turn's ops have actually landed on the canvas
  // (OPS_DONE), provided censorEnabled was true when the turn started.
  // Each iteration: screenshot → POST /v1/censor → render verdict card.
  // If the server returns ops (i.e. handyman produced a fix), dispatch
  // them and the NEXT OPS_DONE re-enters this loop with iteration++.
  function createCensorCard(iteration) {
    const el = document.createElement('div');
    el.className = 'msg censor';
    el.innerHTML = '<div class="censor-head">'
      + '<span class="censor-badge ok">…</span>'
      + '<div class="censor-meta">'
      + '  <span class="censor-iter">Цензор · итерация ' + (iteration + 1) + '/' + MAX_CENSOR_ITERATIONS + '</span>'
      + '  <span class="censor-summary censor-status">Готовлю проверку…</span>'
      + '</div>'
      + '<svg class="censor-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>'
      + '</div>'
      + '<div class="censor-issues"></div>';
    el.querySelector('.censor-head').addEventListener('click', () => el.classList.toggle('open'));
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function setCensorStatus(card, text) {
    const sum = card.querySelector('.censor-summary');
    sum.className = 'censor-summary censor-status';
    sum.textContent = text;
  }

  function renderCensorVerdict(card, verdict, iteration, done, errorText) {
    const badge = card.querySelector('.censor-badge');
    const summary = card.querySelector('.censor-summary');
    const iter = card.querySelector('.censor-iter');
    const issuesBox = card.querySelector('.censor-issues');

    const sev = verdict?.severity || (errorText ? 'minor' : 'ok');
    badge.className = 'censor-badge ' + sev;
    badge.textContent = sev === 'ok' ? '✓ ok' : sev === 'minor' ? '⚠ minor' : '✕ major';

    iter.textContent = 'Цензор · итерация ' + (iteration + 1) + '/' + MAX_CENSOR_ITERATIONS
      + (done ? ' · завершено' : ' · применяю правки');

    summary.className = 'censor-summary';
    summary.textContent = errorText
      ? ('Ошибка цензора: ' + errorText)
      : (verdict?.summary || '(нет описания)');

    issuesBox.innerHTML = '';
    const issues = verdict?.issues ?? [];
    for (const issue of issues) {
      const row = document.createElement('div');
      row.className = 'censor-issue ' + (issue.severity || 'minor');
      const head = document.createElement('div');
      head.className = 'censor-issue-head';
      const cat = document.createElement('span');
      cat.className = 'censor-issue-cat';
      cat.textContent = (issue.category || 'other') + ' · ' + (issue.severity || 'minor');
      const tgt = document.createElement('span');
      tgt.className = 'censor-issue-target';
      tgt.textContent = issue.target || '?';
      head.appendChild(cat);
      head.appendChild(tgt);
      row.appendChild(head);
      const obs = document.createElement('div');
      obs.className = 'censor-issue-obs';
      obs.textContent = issue.observation || '';
      row.appendChild(obs);
      if (issue.suggested_fix) {
        const fix = document.createElement('div');
        fix.className = 'censor-issue-fix';
        fix.textContent = issue.suggested_fix;
        row.appendChild(fix);
      }
      issuesBox.appendChild(row);
    }
    if (issues.length > 0) card.classList.add('open');
  }

  async function runCensorIteration() {
    if (censorIteration >= MAX_CENSOR_ITERATIONS) {
      setBusy(false);
      return;
    }

    // Keep busy=true through every iteration. The cycle started in send()
    // and stays "working" until severity=ok / max iter / error releases it.
    setBusy(true);
    currentCensorCard = createCensorCard(censorIteration);

    let images;
    try {
      setCensorStatus(currentCensorCard, '📸 Делаю снимок холста…');
      images = await requestScreenshot();
      if (!images?.length) throw new Error('пустой ответ скриншота');
    } catch (err) {
      renderCensorVerdict(currentCensorCard, null, censorIteration, true, err.message);
      setBusy(false);
      return;
    }

    try {
      setCensorStatus(currentCensorCard, '🔎 Оцениваю результат…');
      const resp = await fetch(serverUrl + '/v1/censor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId,
          image: { data: images[0], mimeType: 'image/png' },
          iteration: censorIteration,
          userRequest: lastUserPrompt || '',
        }),
        signal: AbortSignal.timeout(180_000),
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      renderCensorVerdict(currentCensorCard, data.verdict, censorIteration, data.done, data.error);

      if (!data.done && data.ops?.length > 0) {
        censorIteration = Number.isFinite(data.iteration) ? data.iteration : censorIteration + 1;
        censorPending = true;          // OPS_DONE re-enters runCensorIteration
        parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: data.ops } }, '*');
        // busy stays true — we're mid-cycle, waiting for OPS_DONE.
      } else {
        setBusy(false);
      }
    } catch (err) {
      renderCensorVerdict(currentCensorCard, null, censorIteration, true, err.message);
      setBusy(false);
    }
  }

  // ── Input helpers ─────────────────────────────────────
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  }

  inputEl.addEventListener('input', autoResize);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  // ── Settings ──────────────────────────────────────────
  settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));
  saveSettingsBtn.addEventListener('click', () => {
    const val = serverInput.value.trim().replace(/\/$/, '');
    if (val) { serverUrl = val; settingsPanel.classList.remove('open'); checkStatus(); }
  });

  // ── Clear ─────────────────────────────────────────────
  function clearChat() {
    sessionId = null;
    attachedImages = [];
    renderScreenshotPreview();
    const msgs = messagesEl.querySelectorAll('.msg');
    msgs.forEach((m, i) => {
      m.style.transition = 'opacity .25s var(--ease-out-expo), transform .25s var(--ease-out-expo)';
      m.style.opacity = '0';
      m.style.transform = 'translateY(-8px) scale(.95)';
      m.style.transitionDelay = (msgs.length - i) * .03 + 's';
    });
    setTimeout(() => {
      messagesEl.innerHTML = '<div class="msg system">Опишите что нужно создать в Figma</div>';
    }, 300);
    parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: [{ type: 'clear_canvas' }] } }, '*');
  }

  clearBtn.addEventListener('click', clearChat);
  eraserBtn.addEventListener('click', clearChat);

  // ── Undo / Redo (textarea) ────────────────────────────
  undoBtn.addEventListener('click', () => {
    inputEl.focus();
    document.execCommand('undo');
  });
  redoBtn.addEventListener('click', () => {
    inputEl.focus();
    document.execCommand('redo');
  });

  // ── Particles ──────────────────────────────────────────
  function initParticles() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animId;

    function resize() {
      canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
      canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    }

    function createParticles() {
      const count = Math.floor((canvas.offsetWidth * canvas.offsetHeight) / 18000);
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.offsetWidth,
          y: Math.random() * canvas.offsetHeight,
          r: Math.random() * 1.4 + .3,
          vx: (Math.random() - .5) * .25,
          vy: (Math.random() - .5) * .25,
          alpha: Math.random() * .5 + .2,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: Math.random() * .015 + .005,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
      for (const p of particles) {
        p.pulse += p.pulseSpeed;
        const a = p.alpha + Math.sin(p.pulse) * .12;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(46,168,255,${Math.max(0, Math.min(1, a))})`;
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < -10) p.x = canvas.offsetWidth + 10;
        if (p.x > canvas.offsetWidth + 10) p.x = -10;
        if (p.y < -10) p.y = canvas.offsetHeight + 10;
        if (p.y > canvas.offsetHeight + 10) p.y = -10;
      }
      animId = requestAnimationFrame(draw);
    }

    resize();
    createParticles();
    draw();

    window.addEventListener('resize', () => { resize(); createParticles(); });
  }

  // ── Init ──────────────────────────────────────────────
  initParticles();
  checkStatus();
  setInterval(checkStatus, 8000);
  setInterval(pollOps, 800);
</script>
</body>
