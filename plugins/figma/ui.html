<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PoopSeek</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e1e;
    --bg2: #2c2c2c;
    --bg3: #383838;
    --border: #3f3f3f;
    --text: #e5e5e5;
    --text-dim: #888;
    --blue: #18a0fb;
    --blue-hover: #0d8de3;
    --red: #f24822;
    --green: #1bc47d;
    --radius: 8px;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    transition: background .3s;
    flex-shrink: 0;
  }
  .dot.ok  { background: var(--blue); box-shadow: 0 0 6px rgba(24,160,251,.4); }
  .dot.err { background: var(--red); }

  .header-label {
    font-size: 11px;
    color: var(--text-dim);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-icon {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 3px 5px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    transition: background .15s, color .15s;
  }
  .btn-icon:hover { background: var(--bg3); color: var(--text); }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

  .msg {
    padding: 9px 12px;
    border-radius: var(--radius);
    line-height: 1.5;
    word-break: break-word;
    max-width: 90%;
    animation: slideIn .2s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .msg.user      { background: var(--blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
  .msg.assistant { background: var(--bg3); align-self: flex-start; border-bottom-left-radius: 3px; }
  .msg.system    { background: rgba(255,255,255,.04); color: var(--text-dim); font-size: 11px; align-self: center; text-align: center; padding: 4px 10px; border-radius: 20px; max-width: 100%; }
  .msg.error     { background: rgba(242,72,34,.12); color: var(--red); align-self: flex-start; border: 1px solid rgba(242,72,34,.2); }
  .msg.thinking  { color: var(--text-dim); background: var(--bg3); align-self: flex-start; border-bottom-left-radius: 3px; }

  /* ── Input ── */
  .input-area {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 9px 11px;
    font-size: 12px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 56px;
    max-height: 140px;
    line-height: 1.45;
    transition: border-color .15s;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  textarea::-webkit-scrollbar { display: none; }
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { border-color: var(--blue); }

  .send-btn {
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    width: 38px;
    height: 38px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s, opacity .15s, transform .1s;
  }
  .send-btn:hover:not(:disabled) { background: var(--blue-hover); transform: scale(1.05); }
  .send-btn:active:not(:disabled) { transform: scale(0.96); }
  .send-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* ── Settings panel ── */
  .settings {
    display: none;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    flex-direction: column;
    background: var(--bg2);
    flex-shrink: 0;
  }
  .settings.open { display: flex; }
  .settings label { font-size: 11px; color: var(--text-dim); }
  .settings input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 6px 9px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    margin-top: 3px;
  }
  .settings input:focus { border-color: var(--blue); }
  .save-btn {
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 11px;
    align-self: flex-end;
    transition: background .15s;
  }
  .save-btn:hover { background: var(--blue-hover); }
</style>
</head>
<body>

<div class="header">
  <div class="dot" id="dot"></div>
  <span class="header-label" id="statusLabel">Подключение…</span>
  <button class="btn-icon" id="clearBtn" title="Очистить чат">✕</button>
  <button class="btn-icon" id="settingsBtn" title="Настройки">⚙</button>
</div>

<div class="settings" id="settings">
  <div>
    <label>Адрес сервера</label>
    <input id="serverInput" type="text" value="http://localhost:7331">
  </div>
  <button class="save-btn" id="saveSettingsBtn">Сохранить</button>
</div>

<div class="messages" id="messages">
  <div class="msg system">Опишите что нужно создать в Figma</div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="Нарисуй онбординг для iOS-приложения…" rows="2"></textarea>
  <button class="send-btn" id="sendBtn" disabled>↑</button>
</div>

<script>
  let serverUrl = 'http://localhost:7331';
  let sessionId = null;
  let busy = false;
  let connected = false;

  const dot = document.getElementById('dot');
  const statusLabel = document.getElementById('statusLabel');
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const settingsPanel = document.getElementById('settings');
  const serverInput = document.getElementById('serverInput');
  const clearBtn = document.getElementById('clearBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');

  // ── Status ──────────────────────────────────────────
  function setStatus(ok, label) {
    connected = ok;
    dot.className = 'dot ' + (ok ? 'ok' : 'err');
    statusLabel.textContent = label;
    sendBtn.disabled = !ok || busy;
  }

  async function checkStatus() {
    try {
      const r = await fetch(serverUrl + '/v1/status', { signal: AbortSignal.timeout(2500) });
      if (r.ok) setStatus(true, 'Сервер подключён');
      else setStatus(false, 'Ошибка сервера');
    } catch {
      setStatus(false, 'Сервер недоступен — запустите /figma');
    }
  }

  // ── CLI ops polling ──────────────────────────────────
  let totalOpsThisTurn = 0;
  async function pollOps() {
    if (!connected) return;
    try {
      const r = await fetch(serverUrl + '/v1/poll-ops', { signal: AbortSignal.timeout(2500) });
      if (!r.ok) return;
      const data = await r.json();
      if (data.ops?.length > 0) {
        totalOpsThisTurn += data.ops.length;
        parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: data.ops } }, '*');
      }
    } catch { /* ignore */ }
  }

  function resetTurnOps() { totalOpsThisTurn = 0; }

  // ── Messages ─────────────────────────────────────────
  function addMsg(text, type) {
    const el = document.createElement('div');
    el.className = 'msg ' + type;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  // ── Thinking dots (JS-based, shows live op count) ────
  function startThinking(el) {
    let n = 0;
    el.textContent = 'Думаю';
    const timer = setInterval(() => {
      n = (n + 1) % 4;
      const dots = '.'.repeat(n || 3);
      const suffix = totalOpsThisTurn > 0 ? ` [${totalOpsThisTurn} элем.]` : '';
      el.textContent = 'Думаю' + dots + suffix;
    }, 350);
    return timer;
  }

  // ── Send ──────────────────────────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    autoResize();

    resetTurnOps();
    addMsg(text, 'user');
    const thinkEl = addMsg('Думаю', 'thinking');
    const thinkTimer = startThinking(thinkEl);

    try {
      const resp = await fetch(serverUrl + '/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text }),
        signal: AbortSignal.timeout(600_000),
      });

      clearInterval(thinkTimer);

      if (!resp.ok) throw new Error('HTTP ' + resp.status);

      const data = await resp.json();
      sessionId = data.sessionId;

      thinkEl.className = 'msg assistant';
      thinkEl.textContent = data.text || '✓';

      // ops already executed via polling; data.ops is empty
    } catch (err) {
      clearInterval(thinkTimer);
      thinkEl.className = 'msg error';
      thinkEl.textContent = 'Ошибка: ' + err.message;
      setStatus(false, 'Нет соединения');
    } finally {
      busy = false;
      sendBtn.disabled = !connected;
    }
  }

  // ── Messages from main thread ─────────────────────────
  window.onmessage = (event) => {
    const msg = event.data?.pluginMessage;
    if (!msg) return;
    if (msg.type === 'OPS_DONE')  addMsg('✓ ' + msg.count + ' элемент(ов) на канвасе', 'system');
    if (msg.type === 'OPS_ERROR') addMsg('Ошибка холста: ' + msg.error, 'error');
  };

  // ── Input helpers ─────────────────────────────────────
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  }

  inputEl.addEventListener('input', autoResize);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  // ── Settings ──────────────────────────────────────────
  settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));
  saveSettingsBtn.addEventListener('click', () => {
    const val = serverInput.value.trim().replace(/\/$/, '');
    if (val) { serverUrl = val; settingsPanel.classList.remove('open'); checkStatus(); }
  });

  // ── Clear ─────────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    sessionId = null;
    messagesEl.innerHTML = '<div class="msg system">Опишите что нужно создать в Figma</div>';
    parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: [{ type: 'clear_canvas' }] } }, '*');
  });

  // ── Init ──────────────────────────────────────────────
  checkStatus();
  setInterval(checkStatus, 8000);
  setInterval(pollOps, 800);
</script>
</body>
</html>
