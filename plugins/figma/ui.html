<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PoopSeek</title>
<style>/* CSS_INLINE */</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="header">
  <div class="dot" id="dot"></div>
  <span class="header-label" id="statusLabel">Подключение…</span>
  <button class="btn-icon" id="clearBtn" title="Очистить чат">✕</button>
  <button class="btn-icon" id="settingsBtn" title="Настройки">⚙</button>
</div>

<div class="settings" id="settings">
  <div class="settings-inner">
    <div>
      <label>Адрес сервера</label>
      <input id="serverInput" type="text" value="http://localhost:7331">
    </div>
    <button class="save-btn" id="saveSettingsBtn">Сохранить</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="msg system">Опишите что нужно создать в Figma</div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="Нарисуй онбординг для iOS-приложения…" rows="3"></textarea>
  <button class="send-btn" id="sendBtn" disabled>
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevrons-right-icon lucide-chevrons-right"><path d="m6 17 5-5-5-5"/><path d="m13 17 5-5-5-5"/></svg>
  </button>
</div>

<script>
  let serverUrl = 'http://localhost:7331';
  let sessionId = null;
  let busy = false;
  let connected = false;
  let usingSse = false;
  let pendingSnapshotResolve = null;
  let pendingSnapshotReject = null;

  const dot = document.getElementById('dot');
  const statusLabel = document.getElementById('statusLabel');
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const settingsPanel = document.getElementById('settings');
  const serverInput = document.getElementById('serverInput');
  const clearBtn = document.getElementById('clearBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');

  // ── Status ──────────────────────────────────────────
  function setStatus(ok, label) {
    connected = ok;
    dot.className = 'dot ' + (ok ? 'ok' : 'err');
    statusLabel.textContent = label;
    sendBtn.disabled = !ok || busy;
  }

  async function checkStatus() {
    try {
      const r = await fetch(serverUrl + '/v1/status', { signal: AbortSignal.timeout(2500) });
      if (r.ok) {
        setStatus(true, 'Сервер подключён');
        syncSnapshotToServer();
      } else setStatus(false, 'Ошибка сервера');
    } catch {
      setStatus(false, 'Сервер недоступен — запустите /figma');
    }
  }

  // ── CLI ops polling ──────────────────────────────────
  let totalOpsThisTurn = 0;
  async function pollOps() {
    if (!connected || usingSse) return;
    try {
      const r = await fetch(serverUrl + '/v1/poll-ops', { signal: AbortSignal.timeout(2500) });
      if (!r.ok) return;
      const data = await r.json();
      if (data.ops?.length > 0) {
        totalOpsThisTurn += data.ops.length;
        parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: data.ops } }, '*');
      }
    } catch { /* ignore */ }
  }

  function resetTurnOps() { totalOpsThisTurn = 0; }

  function requestSnapshotFromPlugin() {
    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        pendingSnapshotResolve = null;
        pendingSnapshotReject = null;
        reject(new Error('Snapshot timeout'));
      }, 3000);

      pendingSnapshotResolve = (snapshot) => {
        clearTimeout(timeout);
        pendingSnapshotResolve = null;
        pendingSnapshotReject = null;
        resolve(snapshot);
      };
      pendingSnapshotReject = (error) => {
        clearTimeout(timeout);
        pendingSnapshotResolve = null;
        pendingSnapshotReject = null;
        reject(error);
      };

      parent.postMessage({ pluginMessage: { type: 'REQUEST_SNAPSHOT' } }, '*');
    });
  }

  async function syncSnapshotToServer() {
    if (!connected) return;

    try {
      const snapshot = await requestSnapshotFromPlugin();
      const resp = await fetch(serverUrl + '/v1/snapshot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, snapshot }),
        signal: AbortSignal.timeout(5000),
      });
      if (resp.ok && !sessionId) {
        const data = await resp.json();
        if (data.sessionId) sessionId = data.sessionId;
      }
    } catch {
      /* snapshot sync is best-effort */
    }
  }

  // ── Messages ─────────────────────────────────────────
  function addMsg(text, type) {
    const el = document.createElement('div');
    el.className = 'msg ' + type;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  // ── Status animation (cycling dots with updatable label) ────
  function startStatusAnim(el, initialLabel) {
    let label = initialLabel;
    let n = 0;
    el.textContent = label;
    el.style.opacity = '0';
    requestAnimationFrame(() => { el.style.opacity = '1'; });
    const timerId = setInterval(() => {
      n = (n + 1) % 4;
      const dots = '.'.repeat(n || 3);
      const suffix = totalOpsThisTurn > 0 ? ` [${totalOpsThisTurn} элем.]` : '';
      el.textContent = label + dots + suffix;
    }, 350);
    return {
      setLabel(newLabel) { label = newLabel; n = 0; el.textContent = newLabel; },
      stop() { clearInterval(timerId); },
    };
  }

  // ── Send ──────────────────────────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    usingSse = false;
    sendBtn.disabled = true;
    inputEl.value = '';
    autoResize();

    resetTurnOps();
    addMsg(text, 'user');
    const thinkEl = addMsg('', 'thinking');
    const anim = startStatusAnim(thinkEl, 'Запрос получен');

    let currentIntent = null;

    try {
      await syncSnapshotToServer();

      const resp = await fetch(serverUrl + '/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify({ sessionId, message: text }),
        signal: AbortSignal.timeout(600_000),
      });

      if (!resp.ok) throw new Error('HTTP ' + resp.status);

      const contentType = resp.headers.get('content-type') || '';

      if (contentType.includes('text/event-stream')) {
        usingSse = true;
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        outer: while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const blocks = buf.split('\n\n');
          buf = blocks.pop();

          for (const block of blocks) {
            if (!block.trim()) continue;
            let eName = 'message', eData = null;
            for (const line of block.split('\n')) {
              if (line.startsWith('event: ')) eName = line.slice(7).trim();
              else if (line.startsWith('data: ')) {
                try { eData = JSON.parse(line.slice(6)); } catch { /* ignore */ }
              }
            }
            if (!eData) continue;
            if (eData.sessionId) sessionId = eData.sessionId;

            switch (eName) {
              case 'intent':
                currentIntent = eData.intent;
                if (eData.intent === 'create') {
                  anim.setLabel('Запрос улучшен');
                  setTimeout(() => anim.setLabel('Выбран режим «Создание»'), 700);
                } else {
                  anim.setLabel('Выбран режим «Редактирование»');
                  setTimeout(() => anim.setLabel('Рукастый мастерски взял Ваши пожелания'), 700);
                }
                break;
              case 'tokens':
                anim.setLabel('Строитель уже кладёт кирпичики');
                break;
              case 'ops':
                if (eData.ops?.length > 0) {
                  totalOpsThisTurn += eData.ops.length;
                  parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: eData.ops } }, '*');
                }
                break;
              case 'done':
                anim.stop();
                thinkEl.className = 'msg assistant';
                thinkEl.textContent = currentIntent === 'create'
                  ? '✓ Дизайн создан и выложен на холст'
                  : (eData.text?.trim() || '✓ Изменения применены');
                break outer;
              case 'error':
                anim.stop();
                thinkEl.className = 'msg error';
                thinkEl.textContent = 'Ошибка: ' + (eData.error || 'неизвестная ошибка');
                break outer;
            }
          }
        }

        if (thinkEl.className === 'msg thinking') {
          anim.stop();
          thinkEl.className = 'msg assistant';
          thinkEl.textContent = '✓ Готово';
        }
      } else {
        // fallback: legacy JSON
        const data = await resp.json();
        sessionId = data.sessionId;
        anim.stop();
        thinkEl.className = 'msg assistant';
        thinkEl.textContent = '✓ Готово';
      }
    } catch (err) {
      anim.stop();
      thinkEl.className = 'msg error';
      thinkEl.textContent = 'Ошибка: ' + err.message;
      setStatus(false, 'Нет соединения');
    } finally {
      usingSse = false;
      busy = false;
      sendBtn.disabled = !connected;
    }
  }

  // ── Messages from main thread ─────────────────────────
  window.onmessage = (event) => {
    const msg = event.data?.pluginMessage;
    if (!msg) return;
    if (msg.type === 'OPS_DONE')  {
      addMsg('✓ ' + msg.count + ' элемент(ов) на канвасе', 'system');
      syncSnapshotToServer();
    }
    if (msg.type === 'OPS_ERROR') addMsg('Ошибка холста: ' + msg.error, 'error');
    if (msg.type === 'SNAPSHOT' && pendingSnapshotResolve) pendingSnapshotResolve(msg.snapshot);
  };

  // ── Input helpers ─────────────────────────────────────
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  }

  inputEl.addEventListener('input', autoResize);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  // ── Settings ──────────────────────────────────────────
  settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));
  saveSettingsBtn.addEventListener('click', () => {
    const val = serverInput.value.trim().replace(/\/$/, '');
    if (val) { serverUrl = val; settingsPanel.classList.remove('open'); checkStatus(); }
  });

  // ── Clear ─────────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    sessionId = null;
    const msgs = messagesEl.querySelectorAll('.msg');
    msgs.forEach((m, i) => {
      m.style.transition = 'opacity .25s var(--ease-out-expo), transform .25s var(--ease-out-expo)';
      m.style.opacity = '0';
      m.style.transform = 'translateY(-8px) scale(.95)';
      m.style.transitionDelay = (msgs.length - i) * .03 + 's';
    });
    setTimeout(() => {
      messagesEl.innerHTML = '<div class="msg system">Опишите что нужно создать в Figma</div>';
    }, 300);
    parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: [{ type: 'clear_canvas' }] } }, '*');
  });

  // ── Particles ──────────────────────────────────────────
  function initParticles() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animId;

    function resize() {
      canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
      canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    }

    function createParticles() {
      const count = Math.floor((canvas.offsetWidth * canvas.offsetHeight) / 18000);
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.offsetWidth,
          y: Math.random() * canvas.offsetHeight,
          r: Math.random() * 1.4 + .3,
          vx: (Math.random() - .5) * .25,
          vy: (Math.random() - .5) * .25,
          alpha: Math.random() * .5 + .2,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: Math.random() * .015 + .005,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
      for (const p of particles) {
        p.pulse += p.pulseSpeed;
        const a = p.alpha + Math.sin(p.pulse) * .12;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(46,168,255,${Math.max(0, Math.min(1, a))})`;
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < -10) p.x = canvas.offsetWidth + 10;
        if (p.x > canvas.offsetWidth + 10) p.x = -10;
        if (p.y < -10) p.y = canvas.offsetHeight + 10;
        if (p.y > canvas.offsetHeight + 10) p.y = -10;
      }
      animId = requestAnimationFrame(draw);
    }

    resize();
    createParticles();
    draw();

    window.addEventListener('resize', () => { resize(); createParticles(); });
  }

  // ── Init ──────────────────────────────────────────────
  initParticles();
  checkStatus();
  setInterval(checkStatus, 8000);
  setInterval(pollOps, 800);
</script>
</body>
</html>
