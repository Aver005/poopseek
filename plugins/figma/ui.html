<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PoopSeek</title>
<style>/* CSS_INLINE */</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="header">
  <div class="dot" id="dot"></div>
  <span class="header-label" id="statusLabel">Подключение…</span>
  <button class="btn-icon" id="clearBtn" title="Очистить чат">✕</button>
  <button class="btn-icon" id="settingsBtn" title="Настройки">⚙</button>
</div>

<div class="settings" id="settings">
  <div class="settings-inner">
    <div>
      <label>Адрес сервера</label>
      <input id="serverInput" type="text" value="http://localhost:7331">
    </div>
    <button class="save-btn" id="saveSettingsBtn">Сохранить</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="msg system">Опишите что нужно создать в Figma</div>
</div>

<input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" multiple style="display:none">

<div id="screenshotPreview" class="screenshot-preview" style="display:none"></div>

<div class="input-area" id="inputArea">
  <div class="input-row">
    <textarea id="input" placeholder="Нарисуй онбординг для iOS-приложения…" rows="3"></textarea>
    <button class="send-btn" id="sendBtn" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 17 5-5-5-5"/><path d="m13 17 5-5-5-5"/></svg>
    </button>
  </div>
  <div class="input-toolbar">
    <button class="toolbar-btn" id="attachBtn" title="Прикрепить файл">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <button class="toolbar-btn" id="screenshotBtn" title="Снимок нод Figma (выделенных или всей страницы)">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
    </button>
    <div class="toolbar-spacer"></div>
    <button class="toolbar-btn" id="undoBtn" title="Отменить ввод (Ctrl+Z)">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
    </button>
    <button class="toolbar-btn" id="redoBtn" title="Повторить ввод (Ctrl+Y)">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="eraserBtn" title="Очистить чат и холст">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
    </button>
  </div>
</div>

<script>
  let serverUrl = 'http://localhost:7331';
  let sessionId = null;
  let busy = false;
  let connected = false;
  let usingSse = false;
  let pendingSnapshotResolve = null;
  let pendingSnapshotReject = null;
  let pendingScreenshotResolve = null;
  let pendingScreenshotReject = null;
  let attachedImages = []; // { data: string (base64), mimeType: string }[]

  const dot = document.getElementById('dot');
  const statusLabel = document.getElementById('statusLabel');
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const attachBtn = document.getElementById('attachBtn');
  const fileInput = document.getElementById('fileInput');
  const screenshotBtn = document.getElementById('screenshotBtn');
  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');
  const eraserBtn = document.getElementById('eraserBtn');
  const screenshotPreview = document.getElementById('screenshotPreview');
  const inputArea = document.getElementById('inputArea');
  const settingsPanel = document.getElementById('settings');
  const serverInput = document.getElementById('serverInput');
  const clearBtn = document.getElementById('clearBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');

  // ── Status ──────────────────────────────────────────
  function setStatus(ok, label) {
    connected = ok;
    dot.className = 'dot ' + (ok ? 'ok' : 'err');
    statusLabel.textContent = label;
    sendBtn.disabled = !ok || busy;
    attachBtn.disabled = busy;          // file/paste/drop always available locally
    screenshotBtn.disabled = !ok || busy;
  }

  // ── Image helpers ─────────────────────────────────────
  const MAX_IMAGE_PX = 1280;

  function resizeToBase64(src) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > MAX_IMAGE_PX || height > MAX_IMAGE_PX) {
          const ratio = Math.min(MAX_IMAGE_PX / width, MAX_IMAGE_PX / height);
          width  = Math.round(width  * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width  = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/png');
        resolve(dataUrl.split(',')[1]);
      };
      img.src = src;
    });
  }

  async function processFile(file) {
    if (!file || !file.type.startsWith('image/')) return null;
    const mimeType = 'image/png';
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const data = await resizeToBase64(reader.result);
          resolve({ data, mimeType });
        } catch (e) { reject(e); }
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function attachFiles(files) {
    const results = await Promise.all(Array.from(files).map(processFile));
    let added = 0;
    for (const img of results) {
      if (img) { attachedImages.push(img); added++; }
    }
    if (added > 0) renderScreenshotPreview();
    return added;
  }

  // ── Screenshot ────────────────────────────────────────
  function requestScreenshot() {
    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        pendingScreenshotResolve = null;
        pendingScreenshotReject = null;
        reject(new Error('Screenshot timeout'));
      }, 8000);

      pendingScreenshotResolve = (images) => {
        clearTimeout(timeout);
        pendingScreenshotResolve = null;
        pendingScreenshotReject = null;
        resolve(images);
      };
      pendingScreenshotReject = (error) => {
        clearTimeout(timeout);
        pendingScreenshotResolve = null;
        pendingScreenshotReject = null;
        reject(error);
      };

      parent.postMessage({ pluginMessage: { type: 'REQUEST_SCREENSHOT' } }, '*');
    });
  }

  function renderScreenshotPreview() {
    if (attachedImages.length === 0) {
      screenshotPreview.style.display = 'none';
      screenshotPreview.innerHTML = '';
      return;
    }
    screenshotPreview.style.display = 'flex';
    screenshotPreview.innerHTML = '';
    attachedImages.forEach((img, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'screenshot-thumb-wrap';
      const thumb = document.createElement('img');
      thumb.src = 'data:' + img.mimeType + ';base64,' + img.data;
      thumb.className = 'screenshot-thumb';
      const rm = document.createElement('button');
      rm.className = 'screenshot-thumb-rm';
      rm.textContent = '×';
      rm.onclick = () => {
        attachedImages.splice(idx, 1);
        renderScreenshotPreview();
      };
      wrap.appendChild(thumb);
      wrap.appendChild(rm);
      screenshotPreview.appendChild(wrap);
    });
  }

  screenshotBtn.addEventListener('click', async () => {
    if (busy) return;
    screenshotBtn.disabled = true;
    try {
      const rawImages = await requestScreenshot();
      for (const b64 of rawImages) {
        const data = await resizeToBase64('data:image/png;base64,' + b64);
        attachedImages.push({ data, mimeType: 'image/png' });
      }
      renderScreenshotPreview();
    } catch (err) {
      addMsg('Не удалось сделать снимок: ' + err.message, 'error');
    } finally {
      screenshotBtn.disabled = !connected || busy;
    }
  });

  // ── File button ───────────────────────────────────────
  attachBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async () => {
    await attachFiles(fileInput.files);
    fileInput.value = '';
  });

  // ── Clipboard paste ───────────────────────────────────
  document.addEventListener('paste', async (e) => {
    if (busy) return;
    const items = Array.from(e.clipboardData?.items ?? []);
    const imageItems = items.filter(item => item.type.startsWith('image/'));
    if (imageItems.length === 0) return;
    e.preventDefault();
    const files = imageItems.map(item => item.getAsFile()).filter(Boolean);
    const added = await attachFiles(files);
    if (added > 0) inputEl.focus();
  });

  // ── Drag and drop ─────────────────────────────────────
  let dragCounter = 0;

  inputArea.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    inputArea.classList.add('drag-over');
  });

  inputArea.addEventListener('dragleave', () => {
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; inputArea.classList.remove('drag-over'); }
  });

  inputArea.addEventListener('dragover', (e) => { e.preventDefault(); });

  inputArea.addEventListener('drop', async (e) => {
    e.preventDefault();
    dragCounter = 0;
    inputArea.classList.remove('drag-over');
    const files = e.dataTransfer?.files;
    if (files?.length) await attachFiles(files);
  });

  async function checkStatus() {
    try {
      const r = await fetch(serverUrl + '/v1/status', { signal: AbortSignal.timeout(2500) });
      if (r.ok) {
        setStatus(true, 'Сервер подключён');
        syncSnapshotToServer();
      } else setStatus(false, 'Ошибка сервера');
    } catch {
      setStatus(false, 'Сервер недоступен — запустите /figma');
    }
  }

  // ── CLI ops polling ──────────────────────────────────
  let totalOpsThisTurn = 0;
  async function pollOps() {
    if (!connected || usingSse) return;
    try {
      const r = await fetch(serverUrl + '/v1/poll-ops', { signal: AbortSignal.timeout(2500) });
      if (!r.ok) return;
      const data = await r.json();
      if (data.ops?.length > 0) {
        totalOpsThisTurn += data.ops.length;
        parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: data.ops } }, '*');
      }
    } catch { /* ignore */ }
  }

  function resetTurnOps() { totalOpsThisTurn = 0; }

  function requestSnapshotFromPlugin() {
    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        pendingSnapshotResolve = null;
        pendingSnapshotReject = null;
        reject(new Error('Snapshot timeout'));
      }, 3000);

      pendingSnapshotResolve = (snapshot) => {
        clearTimeout(timeout);
        pendingSnapshotResolve = null;
        pendingSnapshotReject = null;
        resolve(snapshot);
      };
      pendingSnapshotReject = (error) => {
        clearTimeout(timeout);
        pendingSnapshotResolve = null;
        pendingSnapshotReject = null;
        reject(error);
      };

      parent.postMessage({ pluginMessage: { type: 'REQUEST_SNAPSHOT' } }, '*');
    });
  }

  async function syncSnapshotToServer() {
    if (!connected) return;

    try {
      const snapshot = await requestSnapshotFromPlugin();
      const resp = await fetch(serverUrl + '/v1/snapshot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, snapshot }),
        signal: AbortSignal.timeout(5000),
      });
      if (resp.ok && !sessionId) {
        const data = await resp.json();
        if (data.sessionId) sessionId = data.sessionId;
      }
    } catch {
      /* snapshot sync is best-effort */
    }
  }

  // ── Messages ─────────────────────────────────────────
  function addMsg(text, type) {
    const el = document.createElement('div');
    el.className = 'msg ' + type;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function addUserMsg(text, images) {
    const el = document.createElement('div');
    el.className = 'msg user';
    if (images && images.length > 0) {
      const grid = document.createElement('div');
      grid.className = 'msg-images';
      for (const img of images) {
        const t = document.createElement('img');
        t.src = 'data:' + img.mimeType + ';base64,' + img.data;
        t.className = 'msg-thumb';
        grid.appendChild(t);
      }
      el.appendChild(grid);
    }
    if (text) {
      const txt = document.createElement('div');
      txt.textContent = text;
      el.appendChild(txt);
    }
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  // ── Status animation (cycling dots with updatable label) ────
  function startStatusAnim(el, initialLabel) {
    let label = initialLabel;
    let n = 0;
    el.textContent = label;
    el.style.opacity = '0';
    requestAnimationFrame(() => { el.style.opacity = '1'; });
    const timerId = setInterval(() => {
      n = (n + 1) % 4;
      const dots = '.'.repeat(n || 3);
      const suffix = totalOpsThisTurn > 0 ? ` [${totalOpsThisTurn} элем.]` : '';
      el.textContent = label + dots + suffix;
    }, 350);
    return {
      setLabel(newLabel) { label = newLabel; n = 0; el.textContent = newLabel; },
      stop() { clearInterval(timerId); },
    };
  }

  // ── Send ──────────────────────────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    usingSse = false;
    sendBtn.disabled = true;
    attachBtn.disabled = true;
    screenshotBtn.disabled = true;
    inputEl.value = '';
    autoResize();

    const imagesToSend = attachedImages.slice();
    attachedImages = [];
    renderScreenshotPreview();

    resetTurnOps();
    addUserMsg(text, imagesToSend);
    const thinkEl = addMsg('', 'thinking');
    const anim = startStatusAnim(
      thinkEl,
      imagesToSend.length > 0 ? 'Анализирую картинку' : 'Запрос получен',
    );

    let currentIntent = null;

    try {
      await syncSnapshotToServer();

      const resp = await fetch(serverUrl + '/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify({ sessionId, message: text, images: imagesToSend.length > 0 ? imagesToSend : undefined }),
        signal: AbortSignal.timeout(600_000),
      });

      if (!resp.ok) throw new Error('HTTP ' + resp.status);

      const contentType = resp.headers.get('content-type') || '';

      if (contentType.includes('text/event-stream')) {
        usingSse = true;
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        outer: while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const blocks = buf.split('\n\n');
          buf = blocks.pop();

          for (const block of blocks) {
            if (!block.trim()) continue;
            let eName = 'message', eData = null;
            for (const line of block.split('\n')) {
              if (line.startsWith('event: ')) eName = line.slice(7).trim();
              else if (line.startsWith('data: ')) {
                try { eData = JSON.parse(line.slice(6)); } catch { /* ignore */ }
              }
            }
            if (!eData) continue;
            if (eData.sessionId) sessionId = eData.sessionId;

            switch (eName) {
              case 'vision':
                if (eData.ok) {
                  addMsg('🖼️ Картинка прикреплена ко всем агентам (' + eData.count + ')', 'system');
                } else if (eData.error) {
                  addMsg('⚠️ Картинка не прикреплена: ' + eData.error, 'error');
                }
                break;
              case 'uikit-start':
                anim.setLabel('Собираю UI Kit (' + eData.count + ' компонент.)');
                break;
              case 'uikit-done':
                addMsg('🧩 UI Kit готов: ' + (eData.components?.join(', ') || '(0)'), 'system');
                anim.setLabel('Запрос улучшен');
                break;
              case 'uikit-error':
                addMsg('⚠️ UI Kit не собран — экраны будут с инлайн-фреймами: ' + (eData.error || 'unknown'), 'error');
                break;
              case 'intent':
                currentIntent = eData.intent;
                if (eData.intent === 'create') {
                  anim.setLabel('Запрос улучшен');
                  setTimeout(() => anim.setLabel('Выбран режим «Создание»'), 700);
                } else {
                  anim.setLabel('Выбран режим «Редактирование»');
                  setTimeout(() => anim.setLabel('Рукастый мастерски взял Ваши пожелания'), 700);
                }
                break;
              case 'tokens':
                anim.setLabel('Строитель уже кладёт кирпичики');
                break;
              case 'ops':
                if (eData.ops?.length > 0) {
                  totalOpsThisTurn += eData.ops.length;
                  parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: eData.ops } }, '*');
                }
                break;
              case 'debug-jsx':
                if (eData.jsx) addMsg(eData.jsx, 'debug');
                break;
              case 'done':
                anim.stop();
                thinkEl.className = 'msg assistant';
                thinkEl.textContent = currentIntent === 'create'
                  ? '✓ Дизайн создан и выложен на холст'
                  : (eData.text?.trim() || '✓ Изменения применены');
                break outer;
              case 'error':
                anim.stop();
                thinkEl.className = 'msg error';
                thinkEl.textContent = 'Ошибка: ' + (eData.error || 'неизвестная ошибка');
                break outer;
            }
          }
        }

        if (thinkEl.className === 'msg thinking') {
          anim.stop();
          thinkEl.className = 'msg assistant';
          thinkEl.textContent = '✓ Готово';
        }
      } else {
        // fallback: legacy JSON
        const data = await resp.json();
        sessionId = data.sessionId;
        anim.stop();
        thinkEl.className = 'msg assistant';
        thinkEl.textContent = '✓ Готово';
      }
    } catch (err) {
      anim.stop();
      thinkEl.className = 'msg error';
      thinkEl.textContent = 'Ошибка: ' + err.message;
      setStatus(false, 'Нет соединения');
    } finally {
      usingSse = false;
      busy = false;
      sendBtn.disabled = !connected;
      attachBtn.disabled = false;
      screenshotBtn.disabled = !connected;
    }
  }

  // ── Messages from main thread ─────────────────────────
  window.onmessage = (event) => {
    const msg = event.data?.pluginMessage;
    if (!msg) return;
    if (msg.type === 'OPS_DONE')  {
      addMsg('✓ ' + msg.count + ' элемент(ов) на канвасе', 'system');
      syncSnapshotToServer();
    }
    if (msg.type === 'OPS_ERROR') addMsg('Ошибка холста: ' + msg.error, 'error');
    if (msg.type === 'SNAPSHOT' && pendingSnapshotResolve) pendingSnapshotResolve(msg.snapshot);
    if (msg.type === 'SCREENSHOT_READY' && pendingScreenshotResolve) pendingScreenshotResolve(msg.images);
    if (msg.type === 'SCREENSHOT_ERROR' && pendingScreenshotReject) pendingScreenshotReject(new Error(msg.error));
    if (msg.type === 'DEBUG_LOG' && Array.isArray(msg.lines)) renderDebugLogCard(msg.lines);
  };

  // Render the per-batch log buffer as a copyable card with a single
  // "Copy" button. One click puts the whole log on the clipboard ready
  // to paste back into chat with the assistant.
  function renderDebugLogCard(lines) {
    if (lines.length === 0) return;
    const errCount = lines.filter(l => l.startsWith('ERR')).length;
    const okCount = lines.length - errCount;
    const blob = lines.join('\n');

    const el = document.createElement('div');
    el.className = 'msg debug-log';
    const summary = document.createElement('div');
    summary.className = 'debug-log-summary';
    summary.textContent = '🔍 Debug log: ' + lines.length + ' lines (' + okCount + ' ok, ' + errCount + ' err)';
    const btn = document.createElement('button');
    btn.className = 'debug-log-copy';
    btn.textContent = '📋 Copy';
    btn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(blob);
        btn.textContent = '✓ Copied';
        setTimeout(() => { btn.textContent = '📋 Copy'; }, 1500);
      } catch (err) {
        // Fallback: select the hidden textarea.
        const ta = document.createElement('textarea');
        ta.value = blob; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); btn.textContent = '✓ Copied'; }
        catch { btn.textContent = '✗ Failed'; }
        document.body.removeChild(ta);
        setTimeout(() => { btn.textContent = '📋 Copy'; }, 1500);
      }
    };
    summary.appendChild(btn);
    el.appendChild(summary);
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Input helpers ─────────────────────────────────────
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  }

  inputEl.addEventListener('input', autoResize);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  // ── Settings ──────────────────────────────────────────
  settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));
  saveSettingsBtn.addEventListener('click', () => {
    const val = serverInput.value.trim().replace(/\/$/, '');
    if (val) { serverUrl = val; settingsPanel.classList.remove('open'); checkStatus(); }
  });

  // ── Clear ─────────────────────────────────────────────
  function clearChat() {
    sessionId = null;
    attachedImages = [];
    renderScreenshotPreview();
    const msgs = messagesEl.querySelectorAll('.msg');
    msgs.forEach((m, i) => {
      m.style.transition = 'opacity .25s var(--ease-out-expo), transform .25s var(--ease-out-expo)';
      m.style.opacity = '0';
      m.style.transform = 'translateY(-8px) scale(.95)';
      m.style.transitionDelay = (msgs.length - i) * .03 + 's';
    });
    setTimeout(() => {
      messagesEl.innerHTML = '<div class="msg system">Опишите что нужно создать в Figma</div>';
    }, 300);
    parent.postMessage({ pluginMessage: { type: 'EXECUTE_OPS', ops: [{ type: 'clear_canvas' }] } }, '*');
  }

  clearBtn.addEventListener('click', clearChat);
  eraserBtn.addEventListener('click', clearChat);

  // ── Undo / Redo (textarea) ────────────────────────────
  undoBtn.addEventListener('click', () => {
    inputEl.focus();
    document.execCommand('undo');
  });
  redoBtn.addEventListener('click', () => {
    inputEl.focus();
    document.execCommand('redo');
  });

  // ── Particles ──────────────────────────────────────────
  function initParticles() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animId;

    function resize() {
      canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
      canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    }

    function createParticles() {
      const count = Math.floor((canvas.offsetWidth * canvas.offsetHeight) / 18000);
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.offsetWidth,
          y: Math.random() * canvas.offsetHeight,
          r: Math.random() * 1.4 + .3,
          vx: (Math.random() - .5) * .25,
          vy: (Math.random() - .5) * .25,
          alpha: Math.random() * .5 + .2,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: Math.random() * .015 + .005,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
      for (const p of particles) {
        p.pulse += p.pulseSpeed;
        const a = p.alpha + Math.sin(p.pulse) * .12;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(46,168,255,${Math.max(0, Math.min(1, a))})`;
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < -10) p.x = canvas.offsetWidth + 10;
        if (p.x > canvas.offsetWidth + 10) p.x = -10;
        if (p.y < -10) p.y = canvas.offsetHeight + 10;
        if (p.y > canvas.offsetHeight + 10) p.y = -10;
      }
      animId = requestAnimationFrame(draw);
    }

    resize();
    createParticles();
    draw();

    window.addEventListener('resize', () => { resize(); createParticles(); });
  }

  // ── Init ──────────────────────────────────────────────
  initParticles();
  checkStatus();
  setInterval(checkStatus, 8000);
  setInterval(pollOps, 800);
</script>
